<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>هلو ساره 💖</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffecd2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Floating hearts background */
    .hearts {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 2rem;
      animation: floatUp linear infinite;
      opacity: 0.6;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(14px);
      border-radius: 32px;
      padding: 60px 50px;
      box-shadow: 0 20px 60px rgba(255,100,130,0.25);
      max-width: 500px;
      width: 100%;
    }

    .emoji-top {
      font-size: 4rem;
      margin-bottom: 12px;
      animation: bounce 1.4s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 900;
      background: linear-gradient(90deg, #ff6b95, #ff9a5c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    p {
      color: #b05070;
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    .btn {
      background: linear-gradient(135deg, #ff6b95, #ff9a5c);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 18px 50px;
      font-size: 1.4rem;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(255,100,130,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.5px;
    }

    .btn:hover  { transform: scale(1.07); box-shadow: 0 12px 35px rgba(255,100,130,0.55); }
    .btn:active { transform: scale(0.97); }

    /* Video overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .overlay.active { display: flex; }

    .video-box {
      position: relative;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      max-width: 90vw;
      max-height: 80vh;
    }

    .video-box video {
      display: block;
      max-width: 90vw;
      max-height: 75vh;
    }

    .close-btn {
      margin-top: 20px;
      background: #fff;
      color: #ff6b95;
      border: none;
      border-radius: 50px;
      padding: 12px 36px;
      font-size: 1.1rem;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.15s;
    }
    .close-btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>

  <!-- Floating hearts -->
  <div class="hearts" id="hearts"></div>

  <!-- Main card -->
  <div class="container">
    <div class="emoji-top">🌸</div>
    <h1>هلو ساره! 💖</h1>
    <p>ورد لج يا قمر ✨</p>
    <button class="btn" onclick="showVideo()">هلاوو 🎉</button>
  </div>

  <!-- Video overlay -->
  <div class="overlay" id="overlay">
    <div class="video-box">
      <video id="myVideo" controls autoplay>
        <source src="1234.mp4" type="video/mp4">
        المتصفح ما يدعم الفيديو
      </video>
    </div>
    <button class="close-btn" onclick="closeVideo()">✕ إغلاق</button>
  </div>

  <script>
    // Generate floating hearts
    const heartsEl = document.getElementById('hearts');
    const emojis = ['💖','💕','🌸','✨','💗','🌺','💞'];
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('span');
      h.classList.add('heart');
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
      h.style.animationDuration = (5 + Math.random() * 8) + 's';
      h.style.animationDelay = (Math.random() * 6) + 's';
      heartsEl.appendChild(h);
    }

    function showVideo() {
      document.getElementById('overlay').classList.add('active');
    }

    function closeVideo() {
      const v = document.getElementById('myVideo');
      v.pause();
      v.currentTime = 0;
      document.getElementById('overlay').classList.remove('active');
    }

    // Close overlay when clicking outside video box
    document.getElementById('overlay').addEventListener('click', function(e) {
      if (e.target === this) closeVideo();
    });
  </script>
</body>
</html>
